services:
  postgres:
    image: postgres:16
    container_name: n8n-postgres
    environment:
      POSTGRES_USER: n8n
      POSTGRES_PASSWORD: n8n_password
      POSTGRES_DB: n8n
    volumes:
      - ./infra/postgres/data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: n8n-redis
    command: redis-server --appendonly yes
    volumes:
      - ./infra/redis/data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped

  n8n-main:
    image: n8nio/n8n:latest
    container_name: n8n-main
    depends_on:
      - postgres
      - redis
    ports:
      - "5678:5678"
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: n8n
      DB_POSTGRESDB_PASSWORD: n8n_password

      EXECUTIONS_MODE: queue
      QUEUE_BULL_REDIS_HOST: redis
      QUEUE_BULL_REDIS_PORT: 6379

      N8N_HOST: unlacerated-wamblingly-malissa.ngrok-free.dev
      N8N_PROTOCOL: https
      WEBHOOK_URL: https://unlacerated-wamblingly-malissa.ngrok-free.dev
      N8N_EDITOR_BASE_URL: https://unlacerated-wamblingly-malissa.ngrok-free.dev
      N8N_PORT: 5678

      N8N_ENCRYPTION_KEY: local_dev_change_me_12345678901234567890
      GENERIC_TIMEZONE: Asia/Ho_Chi_Minh
      TZ: Asia/Ho_Chi_Minh
    volumes:
      - ./n8n:/home/node/.n8n
    restart: unless-stopped

  n8n-worker:
    image: n8nio/n8n:latest
    depends_on:
      - postgres
      - redis
    command: worker --concurrency=5
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: n8n
      DB_POSTGRESDB_PASSWORD: n8n_password

      EXECUTIONS_MODE: queue
      QUEUE_BULL_REDIS_HOST: redis
      QUEUE_BULL_REDIS_PORT: 6379

      N8N_ENCRYPTION_KEY: local_dev_change_me_12345678901234567890
      GENERIC_TIMEZONE: Asia/Ho_Chi_Minh
      TZ: Asia/Ho_Chi_Minh
    volumes:
      - ./n8n:/home/node/.n8n
    restart: unless-stopped